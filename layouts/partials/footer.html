<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-logo">
      <img src="{{ .Site.Params.footer_logo }}" alt="{{ .Site.Title }}">
    </div>
    <div class="footer-info">
      <p>
        {{ if eq .Lang "zh" }}
          打開—當代藝術工作站 Open Contemporary Art Center<br>
          台北市大同區甘州街25號<br>
          ocac.tw@gmail.com
        {{ else }}
          Open Contemporary Art Center<br>
          No. 25, Ganzhou St., Datong Dist., Taipei City, Taiwan<br>
          ocac.tw@gmail.com
        {{ end }}
      </p>
    </div>
    <div class="footer-links">
      <a href="https://www.facebook.com/ocac.tw" target="_blank" rel="noopener">Facebook</a>
      <a href="https://www.instagram.com/ocac.tw" target="_blank" rel="noopener">Instagram</a>
    </div>
    <div class="footer-copy">
      <p>&copy; {{ now.Year }} Open Contemporary Art Center</p>
    </div>
  </div>
</footer>
